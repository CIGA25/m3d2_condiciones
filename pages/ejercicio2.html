<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <title>m3d2Condiciones</title>
  </head>
  <body>
    <main class="principal">
      <h1 class="sticker-t">Puedes llevar hasta 10 stickers en total.</h1>
      <section class="stickers">
        <div class="caja-s">
          <img
            src="../assets/img/s1.webp"
            alt="imagen del sticker 1"
            class="img-s"
          />
          <input
            type="number"
            placeholder="Ingresa la cantidad"
            id="sticker1"
            min="0"
          />
        </div>
        <div class="caja-s">
          <img
            src="../assets/img/s2.webp"
            alt="imagen del sticker 1"
            class="img-s"
          />
          <input
            type="number"
            placeholder="Ingresa la cantidad"
            id="sticker2"
            min="0"
          />
        </div>
        <div class="caja-s">
          <img
            src="../assets/img/s3.webp"
            alt="imagen del sticker 1"
            class="img-s"
          />
          <input
            type="number"
            placeholder="Ingresa la cantidad"
            id="sticker3"
            min="0"
          />
        </div>
      </section>
      <p id="cantidad-s"></p>
      <button class="btn1" onclick="llevar()">Me los llevo</button>
    </main>
    <a href="../index.html" class="volver">Volver</a>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
